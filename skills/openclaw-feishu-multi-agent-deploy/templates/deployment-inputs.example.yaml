project:
  name: customer-feishu-multi-agent
  owner: delivery-team
  environment: prod

platform:
  target: "linux" # linux | macos | wsl2 | windows-native-not-recommended
  service_manager: "systemd-user" # systemd-user | launchd | manual
  python_command: "python3"
  openclaw_home: "~/.openclaw"
  watchdog:
    enabled: true
    stale_seconds: 180
    systemd_timer_name: "v51-team-<teamKey>.timer"
    launchd_label: "bot.molt.v51-team-<teamKey>"

openclaw:
  version: "v2026.3.2"
  config_path: "~/.openclaw/openclaw.json"
  restart_command: "openclaw gateway restart"
  healthcheck_command: "openclaw gateway status"
  plugin:
    id: "@openclaw/feishu"
    installed: true

change:
  existing_deployment: true
  change_mode: "incremental" # incremental | full_replace
  rollout_strategy: "canary_then_full" # canary_then_full | direct_full
  backup_required: true
  canary_group_id: "oc_group_internal"

feishu:
  connectionMode: "websocket" # websocket | webhook
  domain: "feishu" # feishu | lark
  defaultAccount: "aoteman"
  bot_group_mention_enabled: true
  card_callbacks_enabled: false
  webhook:
    callback_url: ""
    verification_token: ""

accounts:
  - accountId: "aoteman"
    appId: "cli_a923c749bab6dcba"
    appSecret: "<replace-aoteman-app-secret>"
    encryptKey: "<替换为客户真实值>"
    verificationToken: "<替换为客户真实值>"
  - accountId: "xiaolongxia"
    appId: "cli_a9f1849b67f9dcc2"
    appSecret: "<replace-xiaolongxia-app-secret>"
    encryptKey: "<替换为客户真实值>"
    verificationToken: "<替换为客户真实值>"
  - accountId: "yiran_yibao"
    appId: "cli_a923c71498b8dcc9"
    appSecret: "<replace-yiran-yibao-app-secret>"
    encryptKey: "<替换为客户真实值>"
    verificationToken: "<替换为客户真实值>"

recommended_v51_fixed_role_accounts:
  enabled: true
  supervisor: "aoteman"
  ops: "xiaolongxia"
  finance: "yiran_yibao"

roleCatalog:
  supervisor_default:
    kind: "supervisor"
    accountId: "aoteman"
    roleKey: "supervisor"
    name: "奥特曼"
    role: "主管总控"
    visibleLabel: "主管"
    responsibility: "接单、拆解、调度、统一收口"
    mentionPatterns: ["@奥特曼", "奥特曼", "主管机器人"]
    systemPrompt: "<替换为客户真实 supervisor prompt>"
  ops_default:
    kind: "worker"
    accountId: "xiaolongxia"
    roleKey: "ops"
    name: "小龙虾找妈妈"
    role: "运营专家"
    visibleLabel: "运营"
    responsibility: "活动打法、节奏、执行动作"
    visibility: "visible"
    systemPrompt: "<替换为客户真实 ops prompt>"
  finance_default:
    kind: "worker"
    accountId: "yiran_yibao"
    roleKey: "finance"
    name: "易燃易爆"
    role: "财务专家"
    visibleLabel: "财务"
    responsibility: "预算、毛利、ROI 与风险"
    visibility: "visible"
    systemPrompt: "<替换为客户真实 finance prompt>"

team_role_combination_template:
  note: "同一个 bot 可以跨很多群复用，但 role 不变；每个群的角色组合可以不同。"
  examples:
    - team_key: "full_team_demo"
      group_peer_id: "oc_replace_full_team_group"
      entry_account_id: "aoteman"
      roles: ["supervisor", "ops", "finance"]
    - team_key: "ops_only_demo"
      group_peer_id: "oc_replace_ops_only_group"
      entry_account_id: "aoteman"
      roles: ["supervisor", "ops"]
    - team_key: "finance_only_demo"
      group_peer_id: "oc_replace_finance_only_group"
      entry_account_id: "aoteman"
      roles: ["supervisor", "finance"]

teams:
  - teamKey: "internal_main"
    displayName: "内部团队群"
    group:
      peerId: "oc_group_internal"
      entryAccountId: "aoteman"
      requireMention: true
    supervisor:
      profileId: "supervisor_default"
      agentId: "supervisor_internal_main"
    workers:
      - profileId: "ops_default"
        agentId: "ops_internal_main"
      - profileId: "finance_default"
        agentId: "finance_internal_main"
    workflow:
      mode: "serial"
      stages:
        - agentId: "ops_internal_main"
        - agentId: "finance_internal_main"

  - teamKey: "external_main"
    displayName: "外部团队群"
    group:
      peerId: "oc_group_external"
      entryAccountId: "aoteman"
      requireMention: true
    supervisor:
      profileId: "supervisor_default"
      agentId: "supervisor_external_main"
      overrides:
        systemPrompt: "<若外部团队主管需要不同上下文，在这里覆盖>"
    workers:
      - profileId: "ops_default"
        agentId: "ops_external_main"
      - profileId: "finance_default"
        agentId: "finance_external_main"
    workflow:
      mode: "serial"
      stages:
        - agentId: "ops_external_main"
        - agentId: "finance_external_main"

builder_review:
  builder_input_schema: "accounts + roleCatalog + teams(profileId + override)"
  derived_outputs:
    - "channels.feishu"
    - "bindings"
    - "agents.list（必要新增）"
    - "v51 runtime manifest"
  bindings_order_rule: "精确规则优先（peer+account） -> account 精确 -> 兜底"
  note: "不要手工维护 bindings 作为输入真源；它是 builder 派生产物。"

tooling:
  tools_allow:
    - "group:fs"
    - "group:runtime"
    - "group:web"
    - "group:messaging"
    - "group:sessions"
  agent_to_agent:
    enabled: true
    allow: ["supervisor_internal_main", "ops_internal_main", "finance_internal_main"]
  sessions:
    visibility: "all"
  session_send_policy:
    default: "allow"

runtime_hygiene:
  enabled: true
  script: "skills/openclaw-feishu-multi-agent-deploy/scripts/v51_team_orchestrator_hygiene.py"
  include_workers: true
  delete_transcripts: true
  required_after_changes:
    - "roleCatalog"
    - "workflow.stages"
    - "worker/supervisor systemPrompt"
    - "hidden main session consumer"

v51_team_runtime:
  enabled: false
  runtime_manifest_path: "references/generated/openclaw-feishu-plugin-v51-runtime-<timestamp>.json"
  team_key: "internal_main"
  supervisor_agent_id: "supervisor_internal_main"
  hidden_main_session_key: "agent:supervisor_internal_main:main"
  db_path: "~/.openclaw/teams/internal_main/state/team_jobs.db"
  watchdog:
    systemd_service_template: "skills/openclaw-feishu-multi-agent-deploy/templates/systemd/v51-team-watchdog.service"
    systemd_timer_template: "skills/openclaw-feishu-multi-agent-deploy/templates/systemd/v51-team-watchdog.timer"
    launchd_template: "skills/openclaw-feishu-multi-agent-deploy/templates/launchd/v51-team-watchdog.plist"
    systemd_service_name: "v51-team-internal_main.service"
    systemd_timer_name: "v51-team-internal_main.timer"
    launchd_label: "bot.molt.v51-team-internal_main"

permissions:
  minimum:
    - "im:message"
    - "im:message.p2p_msg:readonly"
    - "im:message.group_at_msg:readonly"
    - "im:message:send_as_bot"
    - "im:resource"
  mentionless_group_required:
    - "im:message.group_msg"
  events:
    - "im.message.receive_v1"
    - "im.chat.member.bot.added_v1"
    - "im.chat.member.bot.deleted_v1"
  card_callback_event:
    - "card.action.trigger"

acceptance:
  required:
    - "openclaw config validate 通过"
    - "canary 群消息命中目标 team"
    - "无重复触发/无串路由"
    - "回滚命令已验证"
