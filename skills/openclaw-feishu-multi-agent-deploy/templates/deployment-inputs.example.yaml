project:
  name: "customer-openclaw-feishu"
  environment: "prod"
  timezone: "Asia/Shanghai"

openclaw:
  host: "https://your-openclaw-host"
  config_file: "/path/to/openclaw.json"
  existing_deployment: true
  change_mode: "incremental" # incremental | full_replace
  restart_command: "systemctl restart openclaw"
  healthcheck_command: "systemctl status openclaw --no-pager"
  rollback_config_snapshot: "/path/to/openclaw.json.bak"
  preserve_paths:
    - "channels.*"
    - "models"
    - "authProfiles"
    - "logging"
  canary_group_id: "oc_group_a"

feishu:
  connection_mode: "websocket" # websocket | webhook
  domain: "feishu"
  bot_group_mention_enabled: true
  events:
    - "im.message.receive_v1"
  card_callbacks_enabled: false # if true, add card.action.trigger

  # If connection_mode=webhook
  webhook:
    callback_url: ""
    verification_token: ""

  accounts:
    - account_id: "default" # required in multi-bot mode
      app_id: "cli_xxxxxxxxxxxxx"
      app_secret: "xxxxxxxxxxxxxxxx"
      dm_policy: "allowlist" # allowlist | open | closed
      allow_from_open_ids:
        - "ou_xxxxxxxxxxxxx"
      group_policy: "open" # open | closed
      interaction_mode: "mention_free" # mention_required | mention_free
      required_scopes:
        baseline:
          - "im:message:send_as_bot"
          - "im:message.p2p_msg:readonly"
        mention_required:
          - "im:message.group_at_msg:readonly"
        mention_free:
          - "im:message.group_msg OR im:message.group_msg:readonly"
      group_require_mention:
        oc_group_a: false
        oc_group_b: true

agent_design:
  supervisor_agent: "main"
  agents:
    - agent_id: "main"
      model: "openai/gpt-5-mini"
      workspace: "~/.openclaw/workspace-main"
      role: "dispatcher"
      bound_channels:
        - "feishu:default:oc_group_a"
    - agent_id: "writer"
      model: "deepseek/deepseek-chat"
      workspace: "~/.openclaw/workspace-writer"
      role: "content"
      bound_channels:
        - "feishu:default:oc_group_b"
    - agent_id: "brainstorm"
      model: "zai/glm-4.7"
      workspace: "~/.openclaw/workspace-brainstorm"
      role: "ideation"
      bound_channels:
        - "feishu:default:oc_group_c"

agent_to_agent:
  enabled: true
  allow:
    - "main"
    - "writer"
    - "brainstorm"

validation:
  rollout_strategy: "canary_then_full" # canary_then_full | full_direct
  test_messages:
    - channel: "feishu"
      account_id: "default"
      peer_kind: "group"
      peer_id: "oc_group_a"
      message: "ping main"
    - channel: "feishu"
      account_id: "default"
      peer_kind: "group"
      peer_id: "oc_group_b"
      message: "ping writer"
