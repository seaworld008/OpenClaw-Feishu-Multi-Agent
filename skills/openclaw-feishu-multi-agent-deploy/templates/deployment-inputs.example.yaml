project:
  name: customer-feishu-multi-agent
  owner: delivery-team
  environment: prod

platform:
  target: "linux" # linux | macos | wsl2 | windows-native-not-recommended
  service_manager: "systemd-user" # systemd-user | launchd | manual
  python_command: "python3"
  openclaw_home: "~/.openclaw"
  watchdog:
    enabled: true
    stale_seconds: 180
    systemd_timer_name: "v4-3-watchdog.timer"
    launchd_label: "bot.molt.v4-3-watchdog"

openclaw:
  version: "v2026.3.2"
  config_path: "~/.openclaw/openclaw.json"
  restart_command: "openclaw gateway restart"
  healthcheck_command: "openclaw gateway status"
  # service manager 路线：Linux/WSL2 通常走 systemd-user，macOS 走 launchd，Windows 默认走 WSL2
  plugin:
    id: "@openclaw/feishu"
    installed: true

change:
  existing_deployment: true
  change_mode: "incremental" # incremental | full_replace
  rollout_strategy: "canary_then_full" # canary_then_full | direct_full
  backup_required: true
  canary_group_id: "oc_group_a"

feishu:
  connectionMode: "websocket" # websocket | webhook
  domain: "feishu" # feishu | lark
  defaultAccount: "main"
  bot_group_mention_enabled: true
  card_callbacks_enabled: false

  # 若 connectionMode=webhook 才需要
  webhook:
    callback_url: ""
    verification_token: ""

  account_profiles:
    - accountId: "main"
      appId: "cli_xxx"
      appSecret: "xxx"
      encryptKey: "xxx"
      verificationToken: "xxx"
      requireMention: true
      groupPolicy: "open"
      dmPolicy: "pairing"
      allowFrom: []

  # 群策略：可选按群覆盖 requireMention
  group_overrides:
    - chatId: "oc_group_a"
      requireMention: false
    - chatId: "oc_group_b"
      requireMention: true

routing:
  agents:
    - id: "work"
      workspace: "~/.openclaw/workspace-work"
      agentDir: "~/.openclaw/agents/work/agent"
      model: "anthropic/claude-sonnet-4-5"
    - id: "finance"
      workspace: "~/.openclaw/workspace-finance"
      agentDir: "~/.openclaw/agents/finance/agent"
      model: "openai/gpt-4.1"

  # match.channel 对官方插件固定为 "feishu"
  bindings:
    - agentId: "work"
      match:
        channel: "feishu"
        accountId: "main"
        peer:
          kind: "group"
          id: "oc_group_a"
    - agentId: "finance"
      match:
        channel: "feishu"
        accountId: "main"
        peer:
          kind: "group"
          id: "oc_group_b"

tooling:
  # V3（主管派单 -> 三群执行）建议开启
  tools_allow:
    - "group:fs"
    - "group:runtime"
    - "group:web"
    - "group:messaging"
    - "group:sessions"
  agent_to_agent:
    enabled: true
    allow: ["work", "finance"]
  sessions:
    visibility: "all"
  session_send_policy:
    default: "allow"

runtime_hygiene:
  enabled: true
  script: "skills/openclaw-feishu-multi-agent-deploy/scripts/v4_3_session_hygiene.py"
  include_workers: true
  delete_transcripts: true
  required_after_changes:
    - "group systemPrompt"
    - "callbackSessionKey"
    - "COMPLETE_PACKET schema"
    - "hidden main session consumer"

permissions:
  minimum:
    - "im:message"
    - "im:message.p2p_msg:readonly"
    - "im:message.group_at_msg:readonly"
    - "im:message:send_as_bot"
    - "im:resource"
  mentionless_group_required:
    - "im:message.group_msg"
  events:
    - "im.message.receive_v1"
    - "im.chat.member.bot.added_v1"
    - "im.chat.member.bot.deleted_v1"
  card_callback_event:
    - "card.action.trigger"

acceptance:
  required:
    - "openclaw config validate 通过"
    - "canary 群消息命中目标 agent"
    - "无重复触发/无串路由"
    - "回滚命令已验证"
